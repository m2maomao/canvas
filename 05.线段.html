<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas</title>
</head>
<body>
  <canvas id="canvas" width="600" height="400"></canvas>
  <script>
    const c1 = document.getElementById('canvas');
    const ctx = c1.getContext('2d');

    ctx.beginPath();
    
    ctx.moveTo(300, 200);
    ctx.lineTo(350, 250);
    ctx.lineTo(250, 250);
    ctx.lineTo(300, 200);
    ctx.stroke();

    ctx.closePath();
  </script>
</body>
</html>
