<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas</title>
</head>
<body>
  <canvas id="canvas1" width="800" height="600"></canvas>
  <script>
    // 获取画布
    const c1 = document.getElementById('canvas1');
    // 获取画笔,上下文对象
    const ctx = c1.getContext('2d');
    // 1、绘制图形（填充模式x, y 宽度，高度）
    // ctx.fillRect(100, 100, 200, 200);
    // 2、绘制图形（描边模式x, y, 宽度, 高度）
    ctx.strokeRect(300, 100, 200, 200);
    // 清除
    ctx.clearReact(0, 0, c1.clientWidth, c1.clientHeight);
    // 路径分开写法
    ctx.beginPath();
    ctx.react(100, 100, 200, 200);
    ctx.stroke();
    ctx.closePath();
    // 填充分开写法
    ctx.beginPath();
    ctx.react(100, 100, 200, 200);
    ctx.fill();
    ctx.closePath();
    // 动画
    let height = 0;
    let t1 = setInterval(() => {
      height++;
      ctx.clearReact(0, 0, c1.clientWidth, height);
      if (height > c1.clientHeight) {
        clearInterval(t1);
      }
    }, 10);
  </script>
</body>
</html>
